<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorarq - Editor OCR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <div class="app-layout">
        
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span>EXPLORADOR</span>
                <button id="btn-refresh" title="Atualizar Lista"><span class="material-symbols-outlined">refresh</span></button>
            </div>
            
            <div class="sidebar-content">
                <ul id="file-list">
                    </ul>
            </div>

            <button id="btn-toggle-sidebar" class="sidebar-toggle">
                <span class="material-symbols-outlined">chevron_left</span>
                <span class="sidebar-label">Fechar Explorador</span>
            </button>
        </aside>

        <button id="btn-open-sidebar" class="sidebar-trigger hidden">
            <span class="material-symbols-outlined">menu</span>
            
        </button>

        <div class="main-content">

            <div class="container" id="upload-screen">
                <div class="upload-box" id="drop-zone">
                    <span class="material-symbols-outlined icon-large">upload_file</span>
                    <h2>Arraste seu arquivo aqui</h2>
                    <p>PDF ou Imagens (PNG, JPG)</p>
                    <input type="file" id="file-input" hidden accept=".pdf, .png, .jpg, .jpeg">
                    <button class="btn-primary" onclick="document.getElementById('file-input').click()">Selecionar Arquivo</button>
                </div>
            </div>

            <div class="editor-container hidden" id="editor-screen">
                <header class="toolbar">
                    <div class="logo">MEMORARQ<span class="badge">BETA</span></div>
                    <div class="actions">
                        <button class="btn-secondary" id="btn-back">
                            <span class="material-symbols-outlined">upload_file</span> Novo Documento
                        </button>
                        <button class="btn-primary" id="btn-download">
                            <span class="material-symbols-outlined">download</span> Baixar OCR
                        </button>
                    </div>
                </header>

                <main class="split-view">
                    <div class="panel left-panel">
                        <div class="panel-header">Documento Original</div>
                        <div class="content-viewer" id="doc-preview">
                            <p class="placeholder-text">Nenhum documento carregado.</p>
                        </div>
                    </div>

                    <div class="panel right-panel">
                        <div class="panel-header toolbar-header">
                            <span>Texto Extraído (OCR)</span>
                            <div class="editor-tools">
                                <button class="tool-btn" id="btn-save-text" title="Salvar Alterações (Ctrl+S)">
                                    <span class="material-symbols-outlined" style="color: #4ec9b0;">save</span>
                                </button>
                                <button class="tool-btn" id="btn-re-ocr" title="Refazer Leitura (OCR)">
                                    <span class="material-symbols-outlined" style="color: #ce9178;">autorenew</span>
                                </button>
                                <button class="tool-btn" id="btn-ai-fix" title="Corrigir com IA (BERTimbau)">
                                    <span class="material-symbols-outlined" style="color: #9cdcfe;">auto_fix_high</span>
                                </button>
                                <span class="divider-vertical"></span>
                                <span class="divider-vertical"></span>
                                <button class="tool-btn" id="btn-zoom-out"><span class="material-symbols-outlined">text_decrease</span></button>
                                <button class="tool-btn" id="btn-zoom-in"><span class="material-symbols-outlined">text_increase</span></button>
                                <span class="divider-vertical"></span>
                                <button class="tool-btn" id="btn-uppercase"><span class="material-symbols-outlined">uppercase</span></button>
                                <button class="tool-btn" id="btn-lowercase"><span class="material-symbols-outlined">lowercase</span></button>
                                <span class="divider-vertical"></span>
                                <button class="tool-btn" id="btn-copy"><span class="material-symbols-outlined">content_copy</span></button>
                                <button class="tool-btn" id="btn-clear"><span class="material-symbols-outlined">delete</span></button>
                            </div>
                        </div>
                        <textarea id="text-editor" spellcheck="false" placeholder="..."></textarea>
                        <div class="editor-footer">
                            <span id="char-count">0 caracteres</span>
                            <span id="cursor-pos">Ln 1, Col 1</span>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <div id="download-modal" class="modal-overlay hidden">
            <div class="modal-box">
                <h3>Baixar Documento</h3>
                <p>Escolha o formato desejado:</p>
                <div class="modal-actions">
                    <button id="btn-dl-txt" class="btn-secondary">
                        <span class="material-symbols-outlined">description</span> Texto (.txt)
                    </button>
                    <button id="btn-dl-pdf" class="btn-primary">
                        <span class="material-symbols-outlined">picture_as_pdf</span> PDF (.pdf)
                    </button>
                </div>
                <button id="btn-close-modal" class="btn-text">Cancelar</button>
            </div>
    </div>

    <div id="download-modal" class="modal-overlay hidden">
    </div>

    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p id="loading-text">Processando documento...</p>
        <span class="loading-subtext">Isso pode levar alguns segundos.</span>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
